name: Luna Engine Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'luna-only'
        type: choice
        options:
          - luna-only
          - dev-test
          - rosa-demo
          - tarcila
      platform:
        description: 'Target platform'
        required: true
        default: 'linux-x64'
        type: choice
        options:
          - linux-x64
          - windows-x64

jobs:
  build:
    runs-on: ${{ inputs.platform == 'windows-x64' && 'windows-latest' || 'ubuntu-latest' }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (Linux)
        if: inputs.platform == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-webkit2-4.1 || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[ci]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        run: pytest tests/ -x --timeout=30 || echo "::warning::Some tests failed"

      - name: Run Forge build
        env:
          LUNA_ENGINE_ROOT: ${{ github.workspace }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'Builds/Lunar-Forge')
          from core import BuildPipeline
          from pathlib import Path

          forge_root = Path('Builds/Lunar-Forge')
          profile_path = forge_root / 'profiles' / '${{ inputs.profile }}.yaml'
          pipeline = BuildPipeline(
              profile_path,
              platform_target='${{ inputs.platform }}',
              forge_root=forge_root,
          )
          report = pipeline.build(
              on_progress=lambda msg, pct: print(f'[{pct:3d}%] {msg}' if pct >= 0 else f'      {msg}')
          )
          print(f'\nStatus: {report.status}')
          if hasattr(report, 'total_size'):
              print(f'Size: {report.total_size / (1024 * 1024):.0f} MB')
          if hasattr(report, 'file_count'):
              print(f'Files: {report.file_count}')
          if hasattr(report, 'errors') and report.errors:
              for e in report.errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          if report.status != 'SUCCESS':
              sys.exit(1)
          "

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-${{ inputs.profile }}-${{ inputs.platform }}-${{ github.run_number }}
          path: Builds/Lunar-Forge/output/
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.profile }}-${{ github.run_number }}
          path: Builds/Lunar-Forge/logs/
          retention-days: 7
