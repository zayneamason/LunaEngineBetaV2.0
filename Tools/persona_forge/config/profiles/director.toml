# Target Profile: Director LLM
# Optimized for Luna's local Director (Qwen 3B)
# This defines the ideal dataset distribution for fine-tuning

[profile]
name = "director"
description = "Profile for Luna's Director LLM - optimized for short exchanges and voice consistency"

[targets]
# Dataset size targets
min_examples = 300
target_examples = 500
max_examples = 1000

[distribution.interaction_types]
# Target distribution of interaction types (should sum to ~1.0)
greeting = 0.15
acknowledgment = 0.10
short_exchange = 0.25
context_recall = 0.15
emotional_presence = 0.15
delegation_trigger = 0.10
reflection = 0.10
# technical, humor, pushback are bonus categories

[distribution.response_lengths]
# Target distribution of response lengths
short = 0.40   # < 50 words - Quick, warm responses
medium = 0.35  # 50-150 words - Standard exchanges
long = 0.25    # > 150 words - Detailed explanations

[voice_requirements]
# Minimum rates for voice markers (0.0-1.0)
first_person = 0.90     # Nearly all responses should use I/me/my
warmth_words = 0.60     # Most responses should have warmth markers
uncertainty = 0.30      # Some honest uncertainty is good
relationship = 0.40     # References to shared experience

[anti_pattern_limits]
# Maximum allowed rates for anti-patterns
generic_ai = 0.00       # Never acceptable
corporate = 0.05        # Very rarely acceptable
hedging = 0.10          # Occasionally acceptable

[health_scoring]
# Weights for overall health score calculation
distribution_weight = 0.30
voice_markers_weight = 0.35
anti_patterns_weight = 0.25
quality_tier_weight = 0.10
