# Persona Forge Default Configuration

[forge]
name = "Persona Forge"
version = "1.0.0"
default_profile = "director"

[paths]
profiles_dir = "profiles"
probes_dir = "probes"
output_dir = "output"
cache_dir = ".cache"

[dataset]
# Training data settings
min_examples = 300
target_examples = 500
max_examples = 1000
train_split = 0.9

[lockin]
# Lock-in coefficient settings
min_coefficient = 0.15
max_coefficient = 0.95

# Source quality base scores
[lockin.source_weights]
journal = 0.70
session = 0.55
matrix = 0.50
insight = 0.60
synthetic = 0.35
manual = 0.65

# Voice marker bonuses (per category detected)
[lockin.voice_bonuses]
per_category = 0.05
authentic_voice = 0.10  # Bonus for having markers in 3+ categories

# Anti-pattern penalties
[lockin.anti_penalties]
per_category = -0.15

[quality_tiers]
# Lock-in thresholds for quality tiers
gold = 0.75    # >= 0.75
silver = 0.50  # >= 0.50
bronze = 0.0   # < 0.50

[export]
# Export settings
weighted = true  # Apply lock-in weights
[export.tier_multipliers]
gold = 3
silver = 2
bronze = 1

[voight_kampff]
# Voight-Kampff validation settings
default_suite = "luna"
pass_threshold = 0.75
parallel_execution = false
max_concurrent = 5

[tui]
# TUI settings
default_theme = "synthwave"
available_themes = ["synthwave", "midnight", "ember"]
refresh_interval = 1.0  # seconds

[mcp]
# MCP server settings
name = "persona-forge"
port = 8765
