<!DOCTYPE html>
<html>
<head>
  <title>Clear KOZMO Storage</title>
</head>
<body>
  <h1>Clearing KOZMO localStorage...</h1>
  <script>
    localStorage.removeItem('kozmo-navigation-state');
    document.body.innerHTML += '<p>✅ Cleared kozmo-navigation-state</p>';
    document.body.innerHTML += '<p><a href="/">Go to KOZMO</a></p>';
  </script>
</body>
</html>
