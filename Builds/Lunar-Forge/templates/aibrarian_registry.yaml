schema_version: 1

defaults:
  chunk_size: 500
  chunk_overlap: 50
  embedding_model: "local-minilm"
  embedding_dim: 384
  schema_type: "standard"

collections:
  luna_system:
    enabled: false
    display_name: "Luna System Knowledge"
    db_path: "data/aibrarian/luna_system.db"
    schema_type: "standard"
    read_only: true
    ingestion_pattern: "emergent"
    tags:
      - system
      - help
      - features
      - troubleshooting

  kinoni_knowledge:
    enabled: false
    display_name: "Kinoni Knowledge"
    db_path: "data/aibrarian/kinoni.db"
    schema_type: "standard"
    chunk_size: 300
    chunk_overlap: 75
    ingestion_pattern: "ceremonial"
    tags:
      - kinoni
      - uganda
      - community

  dataroom:
    enabled: false
    display_name: "Dataroom"
    db_path: "data/aibrarian/dataroom.db"
    schema_type: "standard"
    ingestion_pattern: "utilitarian"
    tags:
      - investor
      - eclipse
