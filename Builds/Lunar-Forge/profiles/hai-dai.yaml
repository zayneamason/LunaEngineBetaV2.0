name: "Hai Dai Ambassador"
description: "Distribution build for indigenous leaders."
version: "0.3.0"

platform: "auto"

database:
  mode: "seed"

collections:
  luna_system:
    enabled: true
    mode: "compiled"
    source: "data/system/aibrarian/luna_system.db"
  priests_and_programmers:
    enabled: true
    mode: "compiled"
    source: "collections/priests-and-programmers/priests_and_programmers.db"

config:
  personality:
    bootstrap_patches:
      - bootstrap_001_sovereignty
      - bootstrap_003_honesty
      - bootstrap_004_consciousness
      - bootstrap_006_ambassador
    first_meeting_directive: true
  llm_providers:
    mode: "template"
  fallback_chain:
    chain: ["claude", "groq", "gemini"]
  system_knowledge_variant: "ambassador"

secrets:
  mode: "template"

frontend:
  build: true
  debug_mode: false
  pages:
    eclissi: true
    nexus: true
    studio: false
    kozmo: false
    guardian: false
    observatory: true
    settings: true
  widgets:
    engine: true
    voice: true
    memory: true
    qa: false
    prompt: false
    debug: false
    vk: false
    cache: false
    thought: true
    lunascript: false
    radio: true
  settings:
    llm: true
    identity: true
    voice: true
    personality: true
    memory: false
    collections: true
    skills: false
    lunafm: false
    display: true
    network: false
    about: true

wizard:
  enabled: true
  show_voice_step: true
  show_personality_step: true
  providers: ["claude", "groq", "gemini"]
  custom_welcome: >-
    Welcome. Luna is yours. She runs on this device,
    remembers what matters to you, and holds knowledge
    you entrust to her. Let us get her set up.

nuitka:
  standalone: true
  exclude_packages:
    - torch
    - torchvision
    - torchaudio
    - transformers
    - tensorflow
    - keras
    - scipy
    - sklearn
    - matplotlib
    - PIL
    - cv2
    - spacy
    - llama_cpp
    - pymupdf

post_build:
  create_launcher: true
