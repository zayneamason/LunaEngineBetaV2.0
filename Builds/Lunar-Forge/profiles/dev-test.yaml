name: "Dev Test"
description: "Full build with Ahab's data for testing"
version: "0.1.0"

platform: "auto"

database:
  mode: "seed"
  source: "data/user/luna_engine.db"

collections:
  luna_system:
    enabled: true
    mode: "compiled"
    source: "data/system/aibrarian/luna_system.db"
  kinoni_knowledge:
    enabled: true
    mode: "plugin"
    source: "data/local/kinoni.db"
    name: "Kinoni Community Knowledge"
    description: "Cultural knowledge base for ICT Hub deployment"
    tags: ["kinoni", "uganda", "community"]
  dataroom:
    enabled: true
    mode: "plugin"
    source: "data/local/dataroom.db"
    name: "Project Eclipse Data Room"
    description: "Investor-facing documents"
    tags: ["investor", "eclipse"]

skills:
  math:
    mode: "plugin"
    packages: ["sympy"]
  logic:
    mode: "plugin"
    packages: ["sympy"]

config:
  personality:
    bootstrap_patches:
      - bootstrap_001_sovereignty
      - bootstrap_002_relationship
      - bootstrap_003_honesty
      - bootstrap_004_consciousness
  llm_providers:
    mode: "copy"
  fallback_chain:
    chain: ["local", "groq", "claude"]
  skills:
    eden: true
    analytics: true
    reading: true

secrets:
  mode: "env"

frontend:
  build: true
  pages:
    eclissi: true
    studio: true
    kozmo: true
    guardian: true
    observatory: true
    settings: true
  widgets:
    engine: true
    voice: true
    memory: true
    qa: true
    prompt: true
    debug: true
    vk: true
    cache: true
    thought: true
    lunascript: true

nuitka:
  standalone: true
  exclude_packages:
    - torch
    - torchvision
    - torchaudio
    - transformers
    - tensorflow
    - keras
    - scipy
    - sklearn
    - matplotlib
    - PIL
    - cv2
    - spacy
    - llama_cpp

post_build:
  create_launcher: true
