name: "ROSA Demo"
description: "ROSA Energy Conference — Hai Dai demo with Kinoni knowledge"
version: "0.1.0"

platform: "auto"

database:
  mode: "seed"

collections:
  luna_system:
    enabled: true
    mode: "compiled"
    source: "data/system/aibrarian/luna_system.db"
  kinoni_knowledge:
    enabled: true
    mode: "plugin"
    source: "data/local/kinoni.db"
    name: "Kinoni Community Knowledge"
    tags: ["kinoni", "uganda"]

skills:
  math:
    mode: "plugin"
    packages: ["sympy"]
  logic:
    mode: "plugin"
    packages: ["sympy"]

config:
  personality:
    first_meeting_directive: true
    bootstrap_patches:
      - bootstrap_001_sovereignty
      - bootstrap_003_honesty
  llm_providers:
    mode: "copy"
  fallback_chain:
    chain: ["claude", "groq"]

secrets:
  mode: "env"

frontend:
  build: true
  pages:
    eclissi: true
    studio: false
    kozmo: false
    guardian: true
    observatory: false
    settings: true
  widgets:
    engine: true
    voice: true
    memory: true
    qa: false
    prompt: false
    debug: false
    vk: false
    cache: false
    thought: true
    lunascript: false

nuitka:
  standalone: true
  exclude_packages:
    - torch
    - torchvision
    - torchaudio
    - transformers
    - tensorflow
    - keras
    - scipy
    - sklearn
    - matplotlib
    - PIL
    - cv2
    - spacy
    - llama_cpp

post_build:
  create_launcher: true
