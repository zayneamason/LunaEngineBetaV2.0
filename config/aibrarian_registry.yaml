# Luna AiBrarian Registry
# =======================
# Each collection is an independent document database that Luna can search.
# Adding a new collection = adding a new entry here. No code changes needed.
#
# Schema types:
#   "standard"      — documents + chunks + FTS5 + embeddings (default)
#   "investigation"  — standard + entities + connections + gaps + claims
#
# Path resolution:
#   Relative paths resolve from Luna project root.
#   Absolute paths used as-is (e.g., external drives).
#   If db_path doesn't exist and create_if_missing is true,
#   AiBrarianEngine creates an empty database with the correct schema.

schema_version: 1

defaults:
  chunk_size: 500
  chunk_overlap: 50
  embedding_model: "local-minilm"
  embedding_dim: 384
  schema_type: "standard"
  grounding_priority: "supplemental"

collections:

  kinoni_knowledge:
    name: "Kinoni Community Knowledge"
    description: "Cultural knowledge base for ICT Hub deployment"
    db_path: "data/local/kinoni.db"
    project_key: "kinoni-ict-hub"
    ingestion_pattern: "ceremonial"
    enabled: true
    create_if_missing: true
    reflection_mode: "relational"
    tags: ["kinoni", "uganda", "community", "ceremonial"]
    chunk_size: 300
    chunk_overlap: 75

  luna_system:
    name: "Luna System Knowledge"
    description: "Luna's knowledge about her own interface, features, capabilities, limitations, and how to guide users"
    db_path: "data/system/aibrarian/luna_system.db"
    enabled: true
    read_only: true
    create_if_missing: false
    schema_type: "standard"
    reflection_mode: "precision"
    tags: ["system", "help", "features", "navigation", "settings", "troubleshooting"]
    chunk_size: 300
    chunk_overlap: 50
    ingestion_pattern: "emergent"

  research_library:
    name: "Research Library"
    description: "Academic papers, books, and research documents for deep reference"
    db_path: "data/local/research_library.db"
    project_key: "research-library"
    ingestion_pattern: "utilitarian"
    enabled: true
    create_if_missing: true
    extract_on_ingest: true
    extraction_model: "claude-sonnet"
    read_only: false
    reflection_mode: "reflective"
    grounding_priority: "primary"
    tags: ["research", "academic", "papers", "books"]
    chunk_size: 500
    chunk_overlap: 75

