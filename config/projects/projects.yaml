# Luna Project Registry
# ======================
# Defines workspaces Luna can activate.
# Each project maps to a per-project search chain
# at config/projects/{slug}.yaml

schema_version: 1

projects:

  kinoni-ict-hub:
    name: "Kinoni ICT Hub"
    description: "Community knowledge stewardship — Rotary Club of Kinoni, Uganda"
    ingestion_pattern: ceremonial    # emergent | ceremonial | utilitarian
    aperture_default: BALANCED       # TUNNEL | NARROW | BALANCED | WIDE | OPEN
    collections:
      - kinoni_knowledge
    icon: "◈"
    accent: "F97316"                 # orange — guardian color

  eclipse-dataroom:
    name: "Project Eclipse"
    description: "Investor-facing documents and fundraising materials"
    ingestion_pattern: utilitarian
    aperture_default: NARROW
    collections:
      - dataroom
    icon: "◆"
    accent: "60A5FA"

