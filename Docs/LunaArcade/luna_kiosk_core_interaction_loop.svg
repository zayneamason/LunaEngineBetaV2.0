<svg width="100%" viewBox="0 0 680 1080" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --p: #1a1a2e;
    --s: #6b7280;
    --t: #9ca3af;
    --bg2: #f3f4f6;
    --b: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --p: #e5e7eb;
      --s: #9ca3af;
      --t: #6b7280;
      --bg2: #1f2937;
      --b: #374151;
    }
  }
  text.th { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 500; fill: var(--p); }
  text.ts { font-family: "Anthropic Sans", sans-serif; font-size: 12px; fill: var(--s); }
  text.t { font-family: "Anthropic Sans", sans-serif; font-size: 14px; fill: var(--p); }
  .arr { stroke: var(--s); stroke-width: 1.5px; fill: none; }
  .leader { stroke: var(--t); stroke-width: 0.5px; stroke-dasharray: 4 2; fill: none; }
  rect.box { fill: var(--bg2); stroke: var(--b); }

  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray text.th { fill: #444441; } .c-gray text.ts { fill: #5F5E5A; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple text.th { fill: #3C3489; } .c-purple text.ts { fill: #534AB7; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal text.th { fill: #085041; } .c-teal text.ts { fill: #0F6E56; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue text.th { fill: #0C447C; } .c-blue text.ts { fill: #185FA5; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber text.th { fill: #633806; } .c-amber text.ts { fill: #854F0B; }
  .c-pink rect { fill: #FBEAF0; stroke: #993556; } .c-pink text.th { fill: #72243E; } .c-pink text.ts { fill: #993556; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; } .c-coral text.th { fill: #712B13; } .c-coral text.ts { fill: #993C1D; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; } .c-green text.th { fill: #27500A; } .c-green text.ts { fill: #3B6D11; }

  @media (prefers-color-scheme: dark) {
    .c-gray rect { fill: #2C2C2A; stroke: #B4B2A9; } .c-gray text.th { fill: #D3D1C7; } .c-gray text.ts { fill: #B4B2A9; }
    .c-purple rect { fill: #26215C; stroke: #AFA9EC; } .c-purple text.th { fill: #CECBF6; } .c-purple text.ts { fill: #AFA9EC; }
    .c-teal rect { fill: #04342C; stroke: #5DCAA5; } .c-teal text.th { fill: #9FE1CB; } .c-teal text.ts { fill: #5DCAA5; }
    .c-blue rect { fill: #042C53; stroke: #85B7EB; } .c-blue text.th { fill: #B5D4F4; } .c-blue text.ts { fill: #85B7EB; }
    .c-amber rect { fill: #412402; stroke: #EF9F27; } .c-amber text.th { fill: #FAC775; } .c-amber text.ts { fill: #EF9F27; }
    .c-pink rect { fill: #4B1528; stroke: #ED93B1; } .c-pink text.th { fill: #F4C0D1; } .c-pink text.ts { fill: #ED93B1; }
    .c-coral rect { fill: #4A1B0C; stroke: #F0997B; } .c-coral text.th { fill: #F5C4B3; } .c-coral text.ts { fill: #F0997B; }
    .c-green rect { fill: #173404; stroke: #97C459; } .c-green text.th { fill: #C0DD97; } .c-green text.ts { fill: #97C459; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle">Luna kiosk — core interaction loop</text>

<g class="c-gray">
<rect x="200" y="50" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="70" text-anchor="middle" dominant-baseline="central">Sleep mode</text>
<text class="ts" x="340" y="88" text-anchor="middle" dominant-baseline="central">Screen dim, Luna idle animation</text>
</g>

<line x1="340" y1="106" x2="340" y2="140" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="128" text-anchor="start">Any button press</text>

<g class="c-purple">
<rect x="180" y="140" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="160" text-anchor="middle" dominant-baseline="central">Luna wakes up</text>
<text class="ts" x="340" y="178" text-anchor="middle" dominant-baseline="central">Greeting + asks name (voice)</text>
</g>

<line x1="340" y1="196" x2="340" y2="230" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="170" y="230" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="250" text-anchor="middle" dominant-baseline="central">Listening state</text>
<text class="ts" x="340" y="268" text-anchor="middle" dominant-baseline="central">Mic active, Luna's face animates</text>
</g>

<line x1="170" y1="286" x2="80" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="280" y1="286" x2="230" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="286" x2="440" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="510" y1="286" x2="590" y2="330" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
<rect x="40" y="330" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="105" y="350" text-anchor="middle" dominant-baseline="central">Chat</text>
<text class="ts" x="105" y="368" text-anchor="middle" dominant-baseline="central">Bombay Beach</text>
</g>

<g class="c-amber">
<rect x="185" y="330" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="250" y="350" text-anchor="middle" dominant-baseline="central">Wisdom</text>
<text class="ts" x="250" y="368" text-anchor="middle" dominant-baseline="central">Fortunes, advice</text>
</g>

<g class="c-pink">
<rect x="380" y="330" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="445" y="350" text-anchor="middle" dominant-baseline="central">Jokes</text>
<text class="ts" x="445" y="368" text-anchor="middle" dominant-baseline="central">Riffs, bits</text>
</g>

<g class="c-coral">
<rect x="530" y="330" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="595" y="350" text-anchor="middle" dominant-baseline="central">Play games</text>
<text class="ts" x="595" y="368" text-anchor="middle" dominant-baseline="central">Voice or buttons</text>
</g>

<line x1="105" y1="386" x2="105" y2="420" stroke="var(--s)" stroke-width="0.5"/>
<line x1="250" y1="386" x2="250" y2="420" stroke="var(--s)" stroke-width="0.5"/>
<line x1="445" y1="386" x2="445" y2="420" stroke="var(--s)" stroke-width="0.5"/>
<line x1="105" y1="420" x2="445" y2="420" stroke="var(--s)" stroke-width="0.5"/>
<line x1="275" y1="420" x2="275" y2="454" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="140" y="454" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="275" y="474" text-anchor="middle" dominant-baseline="central">Luna speaks response</text>
<text class="ts" x="275" y="492" text-anchor="middle" dominant-baseline="central">TTS out, face animates</text>
</g>

<path d="M140 480 L60 480 L60 258 L168 258" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text class="ts" x="52" y="370" text-anchor="middle" transform="rotate(-90 52 370)">Conversation loop</text>

<line x1="595" y1="386" x2="595" y2="454" class="arr" marker-end="url(#arrow)"/>

<line x1="410" y1="480" x2="595" y2="520" stroke="var(--s)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="520" y="498" text-anchor="middle">Luna offers a game</text>

<g class="c-coral">
<rect x="470" y="454" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="595" y="474" text-anchor="middle" dominant-baseline="central">Game select screen</text>
<text class="ts" x="595" y="492" text-anchor="middle" dominant-baseline="central">L/R to browse, center to pick</text>
</g>

<line x1="595" y1="510" x2="595" y2="550" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
<rect x="470" y="550" width="76" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="508" y="572" text-anchor="middle" dominant-baseline="central">Wisdom</text>
</g>
<g class="c-coral">
<rect x="556" y="550" width="76" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="594" y="572" text-anchor="middle" dominant-baseline="central">Steve J</text>
</g>
<g class="c-teal">
<rect x="642" y="550" width="30" height="44" rx="8" stroke-width="0.5"/>
</g>
<text class="ts" x="660" y="572" text-anchor="middle" dominant-baseline="central">...</text>

<line x1="595" y1="594" x2="595" y2="634" class="arr" marker-end="url(#arrow)"/>

<g class="c-green">
<rect x="470" y="634" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="595" y="654" text-anchor="middle" dominant-baseline="central">Playing game</text>
<text class="ts" x="595" y="672" text-anchor="middle" dominant-baseline="central">~2 min, full screen</text>
</g>

<line x1="595" y1="690" x2="595" y2="730" class="arr" marker-end="url(#arrow)"/>

<g class="c-pink">
<rect x="470" y="730" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="595" y="750" text-anchor="middle" dominant-baseline="central">Results screen</text>
<text class="ts" x="595" y="768" text-anchor="middle" dominant-baseline="central">Score, rank, leaderboard</text>
</g>

<line x1="470" y1="758" x2="410" y2="758" stroke="var(--s)" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="410" y1="758" x2="275" y2="758" stroke="var(--s)" stroke-width="0.5" stroke-dasharray="4 3"/>

<g class="c-purple">
<rect x="140" y="730" width="270" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="275" y="750" text-anchor="middle" dominant-baseline="central">Luna reacts to score</text>
<text class="ts" x="275" y="768" text-anchor="middle" dominant-baseline="central">Cheers, roasts, encourages</text>
</g>

<line x1="595" y1="786" x2="595" y2="830" class="arr" marker-end="url(#arrow)"/>
<line x1="275" y1="786" x2="275" y2="830" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="470" y="830" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="595" y="852" text-anchor="middle" dominant-baseline="central">Play again / pick another</text>
</g>

<g class="c-teal">
<rect x="140" y="830" width="270" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="275" y="852" text-anchor="middle" dominant-baseline="central">Back to conversation</text>
</g>

<path d="M720 852 L640 890 L640 470 L622 470" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<path d="M140 852 L60 852 L60 258 L168 258" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<g class="c-gray">
<rect x="200" y="920" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="940" text-anchor="middle" dominant-baseline="central">Idle timeout (60s silence)</text>
<text class="ts" x="340" y="958" text-anchor="middle" dominant-baseline="central">Luna says goodbye, fades to sleep</text>
</g>

<path d="M275 874 L275 918" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<path d="M595 874 L595 900 L482 918" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<line x1="340" y1="976" x2="340" y2="1010" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="220" y="1010" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="1032" text-anchor="middle" dominant-baseline="central">Back to sleep</text>
</g>

<path d="M220 1032 L40 1032 L40 78 L198 78" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
</svg>